<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector hide odd rows</title>

    <style>
       table {
            border-collapse: collapse;
            width: 20%;
            margin: 20px auto;
        }
 
         td {
            border: 1px solid black;
            padding: 5px;
            text-align: left;
        }
 
       
        tr:nth-child(even) {
            display: none;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
        </tr>
        <tr>

        </tr>
        <tr>
            <td>4</td>
            <td>raj</td>
        </tr>
        <tr>
            <td>5</td>
            <td>pradeep</td>
        </tr>
        <tr>

</body>
</html>
