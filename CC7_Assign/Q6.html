<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single jquery element </title>

    <!-- included jquerylibrary -->
     <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
    <body>
        <h1> get a single element from a selection </h1>
        <ul>
            <li>CSHARP</li>
            <li>SQL</li>
            <li>ADO</li>
        </ul>
    
        <script>
            $(document).ready(function(){
                var allItems = $("li");
                var singleItem = allItems.eq(1);
                console.log(singleItem.text());
            });
        </script>
    </body>
    </html>
