<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hide div tag</title>
    <link rel="stylesheet" href="jquery.css"/>
   
</head>
<body>
    <script src="jquery.js"></script>
    <div id="myDiv">
        Click here to hide
    </div>

    <script>
            $("#myDiv").click(function(){
                $(this).hide(2000);
            });
    </script>
    <a class="back-link" href="JQueryAssign1.3.html">Next Page -></a><br>

</body>
</html>
