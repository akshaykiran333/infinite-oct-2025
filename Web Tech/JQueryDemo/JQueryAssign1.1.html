<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Content</title>
    <link rel="stylesheet" href="jquery.css"/>
   
</head>
<body>
    <script src="jquery.js"></script>

    <div id="div1" class="box">
        Akshay.K
    </div>

    <div id="div2" class="box">
    </div>

    <br>

    <button id="copyBtn">Copy Content</button>

    <script>
        
            $("#copyBtn").click(function(){
                var content = $("#div1").html();
                $("#div2").html(content);
            });
    </script>
<a class="back-link" href="JQueryAssign1.2.html">Next Page -></a><br>


</body>
</html>
