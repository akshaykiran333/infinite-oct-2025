<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change bg color</title>
    <link rel="stylesheet" href="jquery.css"/>
   
</head>
<body>
    <script src="jquery.js"></script>
    
    <input type="text" class="textbox" placeholder="Textbox 1"><br><br>
    <input type="text" class="textbox" placeholder="Textbox 2"><br><br>
    <input type="text" class="textbox" placeholder="Textbox 3"><br><br>

    <script>
        $(document).ready(function(){
            $(".textbox").focus(function(){
                $(this).css({
                    "background-color": "#e0f7fa", 
                    "border-color": "#00796b"      
                });
            });

            $(".textbox").blur(function(){
                $(this).css({
                    "background-color": "#ffffff", 
                    "border-color": "#333333"      
                });
            });
        });
    </script>

</body>
</html>
