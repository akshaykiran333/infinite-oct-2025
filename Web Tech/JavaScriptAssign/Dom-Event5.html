<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom5</title>
    <link rel="stylesheet" href="Dom.css"/>
</head>
<body>
  
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f2f4f7;
        text-align: center;
        padding-top: 40px;
    }

    .image-box {
        width: 300px;
        height: 200px;
        margin: auto;
        border: 3px solid #333;
        border-radius: 6px;
        overflow: hidden;
    }

    img {
        width: 100%;
        height: 100%;
        transition: opacity 0.5s ease-in-out;
    }
</style>
</head>
<body>

<h2>Image Slider (setInterval)</h2>

<div class="image-box">
<img id="slider" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIhbYYUzF7f-tsIr8LASFcZVIYlKK0uzfvZg&s">
</div>

<script>
 var images = [
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQTmyszlWU0O9obc3fRuUadPyLIxrEQBiQ-Fw&s",
    "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS2q_zNICx3os4Y0uJrxs3Oz80eX3WW4oxRFA&s",
    "https://static.vecteezy.com/system/resources/thumbnails/070/370/438/small/tiger-leaps-over-wooden-fence-in-enclosure-photo.jpg"
];

var index = 0;

 setInterval(function () {
    index = (index + 1) % images.length;
    document.getElementById("slider").src = images[index];
}, 2000);
</script>

  
</body>
</html>
