<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom3</title>
    <link rel="stylesheet" href="Dom.css"/>
</head>
<body>
    <h2>Employee Table</h2>

    <button id="toggleBtn">Hide Images</button>
    
    <table>
      <thead>
        <tr>
          <th>Employee Photo</th>
          <th>Employee Name</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><img src="https://www.shutterstock.com/image-photo/portrait-smiling-businessman-front-blue-260nw-2030562134.jpg" alt="Ram" class="emp-img"></td>
          <td>Ram</td>
        </tr>
        <tr>
          <td><img src="https://img.freepik.com/free-photo/portrait-young-confident-woman-startup-manager-office-posing-with-confidence-looking_1258-195341.jpg?semt=ais_hybrid&w=740&q=80" alt="Jimmy" class="emp-img"></td>
          <td>Jimmy</td>
        </tr>
      </tbody>
    </table>
    
    <script>
     
      const toggleBtn = document.getElementById('toggleBtn');
      const images = document.querySelectorAll('.emp-img');
      let isHidden = false;
    
     
      toggleBtn.addEventListener('click', () => {
        isHidden = !isHidden; 
    
        images.forEach(img => {
          img.style.display = isHidden ? 'none' : 'block';
        });
    
        toggleBtn.textContent = isHidden ? 'Show Images' : 'Hide Images';
      });
    </script>
    
</body>
</html>
