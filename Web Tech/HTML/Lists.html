<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1><u>Terms</u></h1>

    <ul>
        <li>
            &lt;Entites&gt;
            <ol>
                <li>&trade; </li>
                <li>&copy; </li>
                <li>&reg; </li>
            </ol>
        </li>
        <li>
            &lt;Currency&gt;
            <ol>
                <li>&yen; </li>
                <li>&#8377; </li>
                <li>&pound; </li>
            </ol>
        </li>
        <li>
            &lt;Scripts&gt;
            <ol>
                <li>H<sub>2</sub>O </li>
                <li>2<sup>3</sup> </li>
            </ol>
        </li>
    </ul>
    
</body>
</html>
