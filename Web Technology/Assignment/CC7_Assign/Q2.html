<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iteration Odd and Even</title>
</head>
<body>
    <script>
        for (var i=0; i<=15;i++)
        {
            if (i%2===0)
            {
                document.write(i+"\t is even</br>");
            }
            else
            {
                document.write(i+"\t is odd</br>")
            }

        }
    </script>
</body>
</html>
