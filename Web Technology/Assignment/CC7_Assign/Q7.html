<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery to add tag </title>
    <!-- included jquey library -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>   
</head>
<body>
    <h1>Index of the list item Sample</h1>
    <ul>
        <li>CSHARP</li>
        <li>SQL</li>
        <li>ADO</li>
    </ul>

    <script>
        $(document).ready(function(){
            $("li").each(function(index){
                $(this).prepend(index + " ");  
            });
        });
    </script>
</body>
</html>
